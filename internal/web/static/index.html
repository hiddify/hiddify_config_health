<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hiddify Config Health</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;display:flex;height:100vh;overflow:hidden}
  #sidebar{width:300px;min-width:220px;border-right:1px solid #2d3748;display:flex;flex-direction:column;overflow:hidden}
  #sidebar h1{padding:16px;font-size:1rem;font-weight:700;color:#a78bfa;border-bottom:1px solid #2d3748;flex-shrink:0}
  #examples{overflow-y:auto;flex:1}
  .example{padding:12px 16px;cursor:pointer;border-bottom:1px solid #1a202c;transition:background .15s}
  .example:hover{background:#1e2533}
  .example.active{background:#1e2a3a}
  .ex-name{font-weight:600;font-size:.9rem}
  .ex-core{font-size:.75rem;color:#718096;margin-top:2px}
  .ex-meta{font-size:.7rem;color:#718096;margin-top:3px}
  .badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:.7rem;font-weight:700;margin-top:4px}
  .badge.pass{background:#065f46;color:#6ee7b7}
  .badge.fail{background:#7f1d1d;color:#fca5a5}
  .badge.running{background:#1e3a5f;color:#93c5fd;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #toolbar{padding:12px 16px;border-bottom:1px solid #2d3748;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
  #toolbar-row1{display:flex;gap:8px;align-items:center}
  #toolbar h2{flex:1;font-size:1rem;color:#a78bfa}
  #deploy-row{display:flex;gap:8px;align-items:center;font-size:.8rem;color:#a0aec0}
  #deploy-row label{display:flex;flex-direction:column;gap:3px;flex:1}
  #deploy-row input{background:#0d1117;border:1px solid #2d3748;border-radius:6px;color:#e2e8f0;padding:6px 8px;font-size:.8rem;font-family:monospace}
  #deploy-row input::placeholder{color:#4a5568}
  .mode-badge{display:inline-block;padding:2px 8px;border-radius:9px;font-size:.7rem;font-weight:700}
  .mode-local{background:#1e3a5f;color:#93c5fd}
  .mode-remote{background:#78350f;color:#fde68a}
  button{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;font-weight:600}
  #btn-run{background:#6d28d9;color:#fff}
  #btn-run:hover{background:#7c3aed}
  #btn-run:disabled{background:#374151;color:#6b7280;cursor:not-allowed}
  #content{flex:1;display:flex;overflow:hidden}
  #log-panel{flex:1;overflow-y:auto;padding:12px 16px;font-family:monospace;font-size:.8rem;background:#0d1117;line-height:1.6}
  .log-line{white-space:pre-wrap;word-break:break-all}
  .log-line.pass{color:#6ee7b7}
  .log-line.fail{color:#fca5a5}
  .log-line.info{color:#93c5fd}
  #results-panel{width:300px;border-left:1px solid #2d3748;overflow-y:auto;padding:12px}
  #results-panel h3{font-size:.85rem;color:#718096;margin-bottom:10px}
  .check-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a202c;font-size:.82rem}
  .check-name{color:#e2e8f0}
  .check-ok{color:#6ee7b7}
  .check-fail{color:#fca5a5}
  .check-warn{color:#fbbf24}
  .check-extra{font-size:.72rem;color:#718096;margin-top:2px}
  .fp-row{font-size:.78rem;padding:4px 0;color:#a0aec0}
  .fp-badge{display:inline-block;padding:2px 8px;border-radius:9px;font-size:.75rem;font-weight:700;margin-bottom:8px}
  .fp-opaque{background:#065f46;color:#6ee7b7}
  .fp-blocked{background:#7f1d1d;color:#fca5a5}
  .fp-leaking{background:#78350f;color:#fde68a}
  .fp-recognizable{background:#1e3a5f;color:#93c5fd}
  .history-section{margin-top:16px}
  .history-row{font-size:.75rem;padding:4px 0;border-bottom:1px solid #1a202c;display:flex;gap:8px;align-items:center}
  .welcome{color:#4a5568;padding:40px;text-align:center;font-size:.9rem}
  #btn-run-all{width:calc(100% - 32px);margin:10px 16px;background:#065f46;color:#fff}
  #btn-run-all:hover{background:#047857}
  #btn-run-all:disabled{background:#374151;color:#6b7280;cursor:not-allowed}
  #core-filter{margin:0 16px 8px;padding:6px 8px;background:#0d1117;border:1px solid #2d3748;border-radius:6px;color:#e2e8f0;font-size:.8rem;width:calc(100% - 32px)}
  #summary-table{width:100%;border-collapse:collapse;font-size:.82rem}
  #summary-table th,#summary-table td{padding:7px 10px;text-align:left;border-bottom:1px solid #1a202c}
  #summary-table th{color:#718096;font-size:.72rem;text-transform:uppercase;position:sticky;top:0;background:#0d1117}
  #summary-table tbody tr{cursor:pointer;transition:background .15s}
  #summary-table tbody tr:hover{background:#1e2533}
</style>
</head>
<body>

<div id="sidebar">
  <h1>🛡 Hiddify Health</h1>
  <button id="btn-run-all">▶ Run All</button>
  <select id="core-filter" title="Filter by core"><option value="">All cores</option></select>
  <div id="examples"><div class="welcome">Loading…</div></div>
</div>

<div id="main">
  <div id="toolbar">
    <div id="toolbar-row1">
      <h2 id="title">Select an example</h2>
      <span id="mode-badge" class="mode-badge mode-local" style="display:none">LOCAL</span>
      <button id="btn-run" disabled>▶ Run</button>
    </div>
    <div id="deploy-row" style="display:none">
      <label>Deploy to server (SSH URL — leave empty to run server locally)
        <input id="inp-deploy" type="text" placeholder="ssh://user@host:22 or ssh://user:pass@host:22">
      </label>
      <label style="flex:0 0 220px">Server address (for client to connect to)
        <input id="inp-server" type="text" placeholder="127.0.0.1">
      </label>
    </div>
  </div>
  <div id="content">
    <div id="log-panel"><div class="welcome">Select an example from the sidebar, then click Run.</div></div>
    <div id="results-panel"><h3>Results</h3><div id="checks-list"></div></div>
  </div>
</div>

<script>
let selectedDir = null;
let es = null;
let examplesList = [];

async function loadExamples() {
  const res = await fetch('/api/examples');
  const items = await res.json() || [];
  examplesList = items;
  // Populate the core filter dropdown (preserve current selection).
  const sel = document.getElementById('core-filter');
  const cur = sel.value;
  const cores = [...new Set(items.map(i => i.core).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All cores</option>' +
    cores.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = cur;
  renderExamples();
}

function visibleExamples() {
  const core = document.getElementById('core-filter').value;
  return core ? examplesList.filter(i => i.core === core) : examplesList;
}

function renderExamples() {
  const items = visibleExamples();
  const el = document.getElementById('examples');
  if (!items.length) { el.innerHTML='<div class="welcome">No examples for this filter.</div>'; return; }
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'example';
    div.dataset.dir = item.dir;
    div.innerHTML = `<div class="ex-name">${item.name}</div><div class="ex-core">${item.core||''}</div>${lastRunMeta(item.last_run)}`;
    div.onclick = () => selectExample(item);
    el.appendChild(div);
  });
}

// lastRunMeta renders the PASS/FAIL badge plus censor verdict + throughput
// from the last stored run (store.Record marshals fields PascalCase).
function lastRunMeta(rec) {
  if (!rec) return '<div class="ex-meta">not run yet</div>';
  const badge = `<span class="badge ${rec.Pass?'pass':'fail'}">${rec.Pass?'PASS':'FAIL'}</span>`;
  let meta = '';
  const fp = rec.Fingerprint || {};
  if (fp.Verdict && fp.Verdict !== 'unknown') {
    const cls = 'fp-'+fp.Verdict;
    meta += `<span class="fp-badge ${cls}" style="margin:4px 6px 0 0;font-size:.65rem;padding:1px 6px">${fp.Verdict}</span>`;
  }
  let dl = 0, ul = 0;
  (rec.Checks||[]).forEach(c => {
    if ((c.Name==='download'||c.Name==='speedtest') && c.Throughput) dl = c.Throughput;
    if (c.Name==='upload' && c.Throughput) ul = c.Throughput;
  });
  let speed = '';
  if (dl) speed += `↓ ${fmtSpeed(dl)}`;
  if (ul) speed += `${dl?'  ':''}↑ ${fmtSpeed(ul)}`;
  if (speed) meta += `<span class="ex-meta" style="display:inline">${speed}</span>`;
  return `<div style="margin-top:4px">${badge}${meta}</div>`;
}

// fmtSpeed renders bytes/sec as KB/s or MB/s.
function fmtSpeed(bps) {
  return bps >= 1048576 ? (bps/1048576).toFixed(1)+' MB/s' : (bps/1024).toFixed(0)+' KB/s';
}

function selectExample(item) {
  selectedDir = item.dir;
  document.getElementById('title').textContent = item.name;
  document.getElementById('btn-run').disabled = false;
  document.querySelectorAll('.example').forEach(e => e.classList.toggle('active', e.dataset.dir === item.dir));
  document.getElementById('deploy-row').style.display = 'flex';
  document.getElementById('mode-badge').style.display = 'inline-block';
  document.getElementById('inp-deploy').value = item.deploy_to_server || '';
  document.getElementById('inp-server').value = item.server || '';
  updateModeBadge();
  clearLog();
  loadHistory(item.dir);
}

function updateModeBadge() {
  const badge = document.getElementById('mode-badge');
  const remote = document.getElementById('inp-deploy').value.trim() !== '';
  badge.className = 'mode-badge ' + (remote ? 'mode-remote' : 'mode-local');
  badge.textContent = remote ? 'REMOTE (SSH)' : 'LOCAL';
}

document.getElementById('inp-deploy').addEventListener('input', updateModeBadge);

function clearLog() {
  document.getElementById('log-panel').innerHTML = '';
  const panel = document.getElementById('checks-list');
  panel.innerHTML = '<h3>Results</h3>';
}

function appendLog(text, cls='') {
  const el = document.getElementById('log-panel');
  const line = document.createElement('div');
  line.className = 'log-line ' + cls;
  line.textContent = text;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setRunning(running) {
  const btn = document.getElementById('btn-run');
  btn.disabled = running;
  btn.textContent = running ? '⏳ Running…' : '▶ Run';
  if (selectedDir) {
    const ex = document.querySelector(`.example[data-dir="${CSS.escape(selectedDir)}"]`);
    if (ex) {
      const badge = ex.querySelector('.badge');
      if (running) {
        if (badge) badge.remove();
        const b = document.createElement('span');
        b.className = 'badge running'; b.textContent = 'RUNNING';
        ex.appendChild(b);
      }
    }
  }
}

document.getElementById('btn-run').onclick = () => {
  if (!selectedDir) return;
  if (es) { es.close(); es = null; }
  clearLog();
  setRunning(true);

  const deploy = document.getElementById('inp-deploy').value.trim();
  const server = document.getElementById('inp-server').value.trim();
  let url = `/api/run?dir=${encodeURIComponent(selectedDir)}`;
  if (deploy) url += `&deploy=${encodeURIComponent(deploy)}`;
  if (server) url += `&server=${encodeURIComponent(server)}`;

  es = new EventSource(url);

  es.addEventListener('log', e => {
    const t = e.data;
    let cls = 'info';
    if (t.includes('PASS')) cls='pass';
    else if (t.includes('FAIL')) cls='fail';
    appendLog(t, cls);
  });

  es.addEventListener('result', e => {
    try {
      const r = JSON.parse(e.data);
      renderResults(r);
      updateSidebarBadge(selectedDir, r.Pass);
    } catch(_) {}
  });

  es.addEventListener('error', e => {
    appendLog('Error: ' + (e.data||'connection lost'), 'fail');
    if (e.type === 'error' && (!e.data)) {
      // Network-level SSE error (not an application error event) — stop.
      if (es) { es.close(); es = null; }
      setRunning(false);
    }
  });

  es.addEventListener('done', () => {
    es.close(); es = null;
    setRunning(false);
    if (selectedDir) loadHistory(selectedDir);
  });
};

// variantPanelId returns a stable DOM id for a variant's results section.
function variantPanelId(variant) {
  return 'vp-' + btoa(encodeURIComponent(variant||'default')).replace(/[^a-z0-9]/gi,'');
}

function renderResults(r) {
  const panel = document.getElementById('checks-list');
  const variantLabel = r.Variant && r.Variant !== r.Name ? r.Variant : '';
  const panelId = variantPanelId(r.Variant);

  // If a section for this variant already exists, replace it; else append.
  let section = document.getElementById(panelId);
  if (!section) {
    section = document.createElement('div');
    section.id = panelId;
    panel.appendChild(section);
  }

  let html = variantLabel
    ? `<h3 style="margin-top:10px;font-size:.82rem;color:#a78bfa">▸ ${variantLabel}</h3>`
    : '<h3>Results</h3>';

  (r.Checks||[]).forEach(c => {
    const cls = c.OK ? 'check-ok' : (c.Optional ? 'check-warn' : 'check-fail');
    const sym = c.OK ? '✓' : (c.Optional ? '!' : '✗');
    const extra = c.Extra || (!c.OK && c.Optional ? 'optional — does not fail run' : '');
    html += `<div class="check-row">
      <div><div class="check-name">${c.Name}</div>${extra?`<div class="check-extra">${extra}</div>`:''}  </div>
      <span class="${cls}">${sym}</span>
    </div>`;
  });

  if (r.Fingerprint) {
    const fp = r.Fingerprint;
    const cls = 'fp-'+(fp.Verdict||'unknown');
    html += `<div style="margin-top:8px"><div class="fp-badge ${cls}">${fp.Verdict}</div>`;
    if (fp.HasDNSLeak) html += `<div class="fp-row">⚠ DNS leak detected</div>`;
    if (fp.SpeedAboveMBps) html += `<div class="fp-row">⚡ Speed &gt; 1 MB/s</div>`;
    html += `<div class="fp-row">Entropy: ${(fp.EntropyScore*100).toFixed(0)}%</div></div>`;
  }

  if (r.CoreVersion && !variantLabel) {
    html += `<div class="fp-row" style="margin-top:8px;color:#4a5568">${r.CoreVersion}</div>`;
  }

  section.innerHTML = html;
}

function updateSidebarBadge(dir, pass) {
  const ex = document.querySelector(`.example[data-dir="${CSS.escape(dir)}"]`);
  if (!ex) return;
  const old = ex.querySelector('.badge');
  if (old) old.remove();
  const b = document.createElement('span');
  b.className = `badge ${pass?'pass':'fail'}`;
  b.textContent = pass?'PASS':'FAIL';
  ex.appendChild(b);
}

async function loadHistory(dir) {
  const res = await fetch('/api/history?dir='+encodeURIComponent(dir));
  const recs = await res.json() || [];
  const panel = document.getElementById('checks-list');
  // Remove existing history section before re-appending.
  const old = panel.querySelector('.history-section');
  if (old) old.remove();
  if (!recs.length) return;
  const section = document.createElement('div');
  section.className = 'history-section';
  let html = '<h3 style="font-size:.8rem;margin-bottom:6px">History</h3>';
  recs.slice(0,10).forEach(r => {
    const d = new Date(r.StartedAt).toLocaleString();
    const vLabel = r.Variant ? `<span style="color:#a78bfa;font-size:.7rem">${r.Variant}</span> ` : '';
    html += `<div class="history-row">
      <span class="${r.Pass?'check-ok':'check-fail'}">${r.Pass?'✓':'✗'}</span>
      <span style="flex:1">${vLabel}${d}</span>
      <span style="color:#4a5568">${r.DurationMs}ms</span>
    </div>`;
  });
  section.innerHTML = html;
  panel.appendChild(section);
}

// --- Run All: run every example sequentially, show summary table ---
const CHECKS_ORDER = ['dns','http','quic','download','upload','ping'];
let runAllActive = false;

document.getElementById('btn-run-all').onclick = runAll;
document.getElementById('core-filter').addEventListener('change', renderExamples);

async function runAll() {
  const toRun = visibleExamples();
  if (runAllActive || !toRun.length) return;
  runAllActive = true;
  const btnAll = document.getElementById('btn-run-all');
  btnAll.disabled = true;
  btnAll.textContent = '⏳ Running all…';
  document.getElementById('btn-run').disabled = true;
  document.getElementById('title').textContent = 'Run All — summary';
  document.getElementById('deploy-row').style.display = 'none';
  document.getElementById('mode-badge').style.display = 'none';
  document.querySelectorAll('.example').forEach(e => e.classList.remove('active'));
  selectedDir = null;

  const log = document.getElementById('log-panel');
  log.innerHTML = `<table id="summary-table"><thead><tr>
    <th>Example</th><th>Variant</th>${CHECKS_ORDER.map(c=>`<th>${c}</th>`).join('')}
    <th>Censor</th><th>Time</th><th>Status</th>
  </tr></thead><tbody></tbody></table>`;
  document.getElementById('checks-list').innerHTML = '<h3>Results</h3>';
  const tbody = log.querySelector('tbody');

  for (const item of toRun) {
    const phRow = document.createElement('tr');
    phRow.innerHTML = `<td>${item.name}</td><td colspan="${CHECKS_ORDER.length+4}"><span class="badge running">RUNNING</span></td>`;
    tbody.appendChild(phRow);
    await runOneCollect(item, tbody, phRow);
  }

  runAllActive = false;
  btnAll.disabled = false;
  btnAll.textContent = '▶ Run All';
  loadExamples(); // refresh sidebar badges
}

function runOneCollect(item, tbody, phRow) {
  return new Promise(resolve => {
    const src = new EventSource(`/api/run?dir=${encodeURIComponent(item.dir)}`);
    const results = [];
    let finished = false;
    src.addEventListener('result', e => { try { results.push(JSON.parse(e.data)); } catch(_){} });
    const finish = () => {
      if (finished) return;
      finished = true;
      src.close();
      phRow.remove();
      if (!results.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${item.name}</td><td colspan="${CHECKS_ORDER.length+4}"><span class="badge fail">ERROR — no result (see example page for log)</span></td>`;
        tr.onclick = () => selectExample(item);
        tbody.appendChild(tr);
      }
      results.forEach(r => {
        const byName = {};
        (r.Checks||[]).forEach(c => byName[c.Name] = c);
        const cells = CHECKS_ORDER.map(name => {
          const c = byName[name];
          if (c === undefined) return '<td style="color:#4a5568">—</td>';
          const cls = c.OK ? 'check-ok' : (c.Optional ? 'check-warn' : 'check-fail');
          const sym = c.OK ? '✓' : (c.Optional ? '!' : '✗');
          return `<td class="${cls}">${sym}</td>`;
        }).join('');
        const variant = r.Variant && r.Variant !== r.Name ? r.Variant : '';
        const ms = Math.round((r.Duration||0)/1e6);
        const censor = r.Fingerprint ? (r.Fingerprint.Verdict||'') : '';
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.Name||item.name}</td><td style="color:#a78bfa">${variant}</td>${cells}
          <td>${censor}</td><td style="color:#718096">${ms}ms</td>
          <td><span class="badge ${r.Pass?'pass':'fail'}">${r.Pass?'PASS':'FAIL'}</span></td>`;
        tr.onclick = () => selectExample(item);
        tbody.appendChild(tr);
      });
      resolve();
    };
    src.addEventListener('done', finish);
    src.onerror = () => finish(); // network-level error — move on to next example
  });
}

loadExamples();
</script>
</body>
</html>
